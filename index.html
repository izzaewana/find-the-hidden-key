<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost in the Maze: Cozy Edition</title>

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="game-wrapper">
        <section class="game-panel">
            <div class="title-area">
                <h1>Lost in the Maze</h1>
                <p>Cozy Edition</p>
            </div>

            <div id="hud">
                <div>Player: <span id="player-name">Traveler</span></div>
                <div>Coins: <span id="coins">0</span>/3</div>
                <div>Key: <span id="key-status">No</span></div>
            </div>

            <div id="message-box">
                Enter your name, then start your cozy maze adventure.
            </div>

            <div id="start-screen">
                <input id="name-input" type="text" placeholder="Your name">
                <button id="start-button">Start</button>
            </div>
            
            <button id="sound-button">Sound: On</button>
            
            <div id="game-board"></div>

            <div id="mobile-controls" class="hidden">
                <button id="up-button">▲</button>
                <div>
                    <button id="left-button">◀</button>
                    <button id="down-button">▼</button>
                    <button id="right-button">▶</button>
                </div>
            </div>

            <div id="instructions">
                Move with Arrow Keys or WASD. On phone, use the buttons.
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
